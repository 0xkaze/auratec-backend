name: Deploy backend → VPS

# Build acontece NA PRÓPRIA VPS (sem registry). O runner empacota o código
# e envia por scp; a VPS builda e sobe via docker compose. Evita o circo de
# registry/visibilidade e não precisa de credencial Git/registry na VPS.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tar FORA do workspace (senão "tar: file changed as we read it") e
      # depois move pra dentro — o scp-action roda num container que só
      # enxerga o workspace, então o arquivo final precisa estar lá.
      - name: Empacotar código
        run: |
          tar czf "$RUNNER_TEMP/auratec-backend.tgz" --exclude=./.git .
          mv "$RUNNER_TEMP/auratec-backend.tgz" ./auratec-backend.tgz

      - name: Enviar pra VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "auratec-backend.tgz"
          target: "~/auratec"

      - name: Build & up na VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 20m
          script: |
            set -eu

            # Serializa com o deploy do frontend (mesmo compose/volumes).
            mkdir -p ~/auratec
            exec 9>~/auratec/.deploy.lock
            flock -x -w 600 9 || { echo "Outro deploy em andamento (>10min)"; exit 1; }

            if [ ! -f ~/auratec/.env ]; then
              echo "❌ ~/auratec/.env não existe. Crie a partir de deploy/.env.prod.example."
              exit 1
            fi

            # Substitui o código do backend pelo pacote recém-enviado.
            rm -rf ~/auratec/backend
            mkdir -p ~/auratec/backend
            tar xzf ~/auratec/auratec-backend.tgz -C ~/auratec/backend
            rm -f ~/auratec/auratec-backend.tgz

            cd ~/auratec/backend/deploy
            # --build recompila o que mudou (cache de layers local resolve o resto).
            # O entrypoint do backend roda as migrations no start do container.
            docker compose -f compose.prod.yml --env-file ~/auratec/.env up -d --build --remove-orphans backend caddy postgres
            docker image prune -f
