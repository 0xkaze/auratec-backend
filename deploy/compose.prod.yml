# Auratec — stack de produção (VPS). Sobe Postgres + backend + frontend
# atrás do Caddy (HTTPS automático). As imagens são BUILDADAS NA VPS a
# partir do código enviado pelo CI (sem registry). Variáveis vêm do `.env`.
#
# Layout esperado na VPS (o CI cuida disso):
#   ~/auratec/backend/   ← código do auratec-backend (contém este arquivo
#                           em deploy/ e o Dockerfile)
#   ~/auratec/frontend/  ← código do auratec-frontend
#   ~/auratec/.env       ← segredos (criado uma vez, à mão)
#
# Uso na VPS (rodado pelo CI):
#   cd ~/auratec/backend/deploy
#   docker compose -f compose.prod.yml --env-file ~/auratec/.env up -d --build
#
# Os contexts de build são relativos a este arquivo (deploy/):
#   backend  → ../            (=~/auratec/backend)
#   frontend → ../../frontend (=~/auratec/frontend)
name: auratec

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  backend:
    build:
      context: ..
    image: auratec-backend:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CORS_ORIGINS: ${PUBLIC_URL}
      FRONTEND_URL: ${PUBLIC_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-7d}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    volumes:
      # GLBs enviados pelo admin persistem aqui. Na 1ª subida o Docker
      # copia os GLBs baked na imagem (uploads/objetos) pro volume.
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  frontend:
    build:
      context: ../../frontend
      args:
        # NEXT_PUBLIC_API_URL é inlined no build do Next. Vem do .env (igual
        # ao PUBLIC_URL) — mesma origem do back, então sem CORS cruzado.
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL}
    image: auratec-frontend:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # Só depende do backend pra ordem de start. NÃO depende do frontend de
    # propósito: assim o deploy do backend não tenta buildar o frontend (que
    # pode não estar na VPS no 1º deploy). O Caddy resolve frontend:3000 em
    # runtime — devolve 502 até o frontend subir, sem precisar reiniciar.
    depends_on:
      - backend
    networks: [internal]

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:

networks:
  internal:
